<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    name:
    <input type="text" id="name" placeholder="Enter name"><br>
    email:
    <input type="text" id="email" placeholder="Enter email"><br>
    password:
    <input type="text" id="paswd" placeholder="Enter password"><br>
    <input type="button" value="submit" id="b1">
    <script>
        const b1=document.getElementById("b1")
        b1.addEventListener("click",()=>{
            const name=document.getElementById("name").value
            const nameReg=/^[a-zA-Z\s]+$/
            const email=document.getElementById("email").value
            const emailReg= /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const paswd=document.getElementById("paswd").value
            const paswdReg=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,16}$/
            if (!nameReg.test(name)) {
                alert("Enter only alphabets")
            }
            if (!emailReg.test(email)) {
                alert("Enter valid email")
            }
            if (!paswdReg.test(paswd)) {
                alert("password must contain atleast one upper,lower and digits")
            }
            alert("form submited successfully")
            localStorage.setItem("name",name)
            localStorage.setItem("email",email)
            localStorage.setItem("paswd",paswd)
        })
    </script>
</body>
</html>
